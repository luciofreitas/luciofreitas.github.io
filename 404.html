<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MPS Projetos Elétricos</title>
  <script>
    // Redireciona rotas do React Router para o index.html via query string
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 1).join('/') +
      '/?p=' + encodeURIComponent(l.pathname + l.search) +
      (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
    );
  </script>
</head>
<body></body>
</html>
