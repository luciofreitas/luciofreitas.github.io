# Render service scaffold for the backend.
#
# Usage:
# - Edit this file to set names/regions/branch if desired.
# - Commit it to the repo and connect the repo to Render; Render will detect the file
#   and can create the service from this configuration.
# - You still need to set secret environment variables in the Render dashboard
#   (DATABASE_URL, SUPABASE keys, etc.). Do NOT commit real secrets.

services:
  - type: web
    name: lucio-backend
    env: node
    plan: free
    region: oregon
    repo: https://github.com/luciofreitas/luciofreitas.github.io
    branch: gh-pages
    root: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    # Environment variables placeholders - edit or set these in the Render dashboard
    envVars:
      - key: DATABASE_URL
        value: "__SET_IN_RENDER_DASHBOARD__"
      - key: VITE_SUPABASE_URL
        value: "__SET_IN_RENDER_DASHBOARD__"
      - key: VITE_SUPABASE_ANON_KEY
        value: "__SET_IN_RENDER_DASHBOARD__"
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "__SET_IN_RENDER_DASHBOARD__"
